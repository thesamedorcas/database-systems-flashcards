a:'QUERY: SELECT * FROM EMPLOYEE E, DEPARTMENT D, DEPENDENT T WHERE T.ESSN=E.SSN AND E.SSN=D.MGR_SSN. rT=50,bT=3. Clustering(E_SSN,xE_SSN=2,NDV=10,sE_SSN=5). rD=125,bD=13. Primary(MGR_SSN,xMGR=1). rE=10000,bE=2000. B+Tree(SSN,xSSN=4). f=10,fRS=2,nB=100. PLAN 1 (T+E first, then ED+D): T with E using B+Tree(SSN): bT+rT*(xSSN+1)+k1=3+50*5+25/2=278. jc_TE=1/max(10000,10)*10000*50=50. bET=ceil(50/2)=25 (fits in 100-block memory). T+E+D using Primary(MGR_SSN): rET*(xMGR+1)=50*2=100 (ET in memory, not read). jc_ETD=1/max(10000,125)*50*125=0.625->1 block (negligible). PLAN 1 TOTAL=278+100=378. PLAN 2 (D+E first, then DE+T): D with E using B+Tree(SSN): bD+rD*(xSSN+1)+k2=13+125*5+63=701. jc_DE=1/max(10000,125)*10000*125=125. bED=ceil(125/2)=63 (fits). DE+T using Clustering(E_SSN): rED*(xE_SSN+ceil(5/10))=125*(2+1)=375. PLAN 2 TOTAL=701+375=1076. PLAN 1 wins by 2.84x. REASON: T(50 tuples) is smaller intermediate than D(125 depts) -> start with smallest join.'},

{u:'QueryOpt2',q:'Holistic optimisation - select first then join, two full plans',
a:'QUERY: SELECT * FROM EMPLOYEE, DEPARTMENT WHERE Salary=1000 AND SSN=MGR_SSN. Clustering(Salary,x=3): NDV=500, s=20/salary. B+Tree(SSN,x=4). Primary(MGR_SSN,x=1). rE=10000,bE=2000. rD=125,bD=13. f=10,fRS=2,nB=100. PLAN 1 (select first, then join): P1.1 Salary=1000 via Clustering: xSalary+ceil(s/f)=3+ceil(20/10)=3+2=5 accesses. Intermediate: 20 tuples=2 blocks (in memory). P1.2 join filtered employees (in memory) with D via Primary(MGR_SSN): rFE*(xMGR+1)=20*2=40. jc_F=1/max(10000,125)*20*125=0.25 matching tuples -> negligible k. PLAN 1 TOTAL=5+40=45 block accesses. PLAN 2 (join first, then select): P2.1 join via B+Tree(SSN): bD+rD*(xSSN+1)+k=13+125*5+63=701. Intermediate: 125 managers, 63 blocks in memory. P2.2 filter Salary=1000: 0.25 matching tuples (same result as Plan 1!). PLAN 2 TOTAL=701. RATIO: 701/45=15.6x worse. LESSON: intermediate in Plan 1 is 20 tuples vs 125 in Plan 2. Push selections BEFORE joins. This is the main heuristic in query optimisation.'},

{u:'QueryOpt2',q:'Optimisation use case II - disjunctive query with OR and memory filtering loops',
a:'QUERY: SELECT * FROM EMPLOYEE WHERE Dno=5 OR (Salary>=500 AND EXP=0). Memory=1100 blocks. b=2000. SELECTIVITIES: sl(Salary>=500)=(10000-500)/9900=0.959. sl(EXP=0)=0.5. Conjunctive sl=0.4795. sl(DNO=5)=0.008. Disjunctive total=0.4836 -> 4836.6 emp -> ideal=968 blocks. Condition 1 (DNO=5 via B+Tree): 83 accesses, 80 tuples=16 blocks in memory. Condition 2 option A (EXP=0 first via B+Tree then Salary filter): 5003 accesses, 5000 tuples=1000 blocks -> 1100-16=1084 free -> FITS! Total A: 83+5003=5086. Condition 2 option B (Salary>=500 via Clustering first then EXP filter): 1921 accesses, 9590 tuples=1918 blocks > available 1084 -> must write 834 blocks to disk. Loop 1: filter 1084, free 542, read 542 more. Loop 2: filter 542, read 271. Loop 3: read 21. Total B: 83+1921+834+542+271+21=3672. ALL worse than linear scan (2000)! With MORE memory (2000 blocks): Plan B cost=83+1921=2004 approx linear scan. LESSON: OR queries with large selectivity are hard; memory matters enormously.'},

{u:'QueryOpt2',q:'HyperLogLog, Count Distinct Problem, and NeuroCard',
a:'JOIN COST FORMULAS require NDV(A,R) = number of distinct values of attribute A in relation R. Computing NDV exactly requires full scan: O(r) time and O(r) memory -> does NOT scale for huge r. THE COUNT DISTINCT PROBLEM: estimate NDV efficiently. Hash-based method: O(r) - does not scale as r approaches infinity. HYPERLOGLOG (Heule et al., Google, EDBT 2013): complexity O(log(log r)+log r). Uses probabilistic data structures (hash functions + bit patterns) to estimate cardinality with small error and tiny memory (a few KB). Now used in Google BigQuery for cardinality estimation in the query planner. Paper: "HyperLogLog in practice: algorithmic engineering of a state-of-the-art cardinality estimation algorithm." NEUROCARD (Yang et al., VLDB 2020): neural network cardinality estimator for multiple tables. Uses deep unsupervised learning. "One cardinality estimator for all tables." Represents modern trend: ML-based query optimisation. The optimizer needs NDV estimates "extremely fast" to be useful at query planning time.'},

];

let activeUnit='all', deck=[...ALL_CARDS], idx=0, flipped=false, touchStartX=0;

function unitLabel(id){return(UNITS.find(u=>u.id===id)||{}).label||id;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function updateCounter(){
  const el=document.getElementById('topCounter');
  if(el&&deck.length)el.innerHTML='<span>'+(idx+1)+'</span> / '+deck.length;
}

function renderCard(dir){
  const card=deck[idx];
  document.getElementById('main').innerHTML=
    '<div class="progress-bar"><div class="progress-fill" style="width:'+((idx+1)/deck.length*100)+'%"></div></div>'+
    '<div class="card-scene" id="cardScene">'+
    '<div class="card'+(flipped?' flipped':'')+'" id="theCard">'+
    '<div class="card-face card-front">'+
    '<div class="card-header"><div class="card-type">Topic</div><div class="card-unit">'+esc(unitLabel(card.u))+'</div></div>'+
    '<div class="card-body"><div class="card-text">'+esc(card.q)+'</div></div>'+
    '<div class="card-mark">Q</div>'+
    '<div class="card-hint">tap card &middot; press flip &middot; swipe</div>'+
    '</div>'+
    '<div class="card-face card-back">'+
    '<div class="card-header"><div class="card-type">Detail</div><div class="card-unit">'+esc(unitLabel(card.u))+'</div></div>'+
    '<div class="card-body"><div class="card-text">'+esc(card.a)+'</div></div>'+
    '<div class="card-mark">A</div>'+
    '</div></div></div>'+
    '<div class="nav">'+
    '<button class="nav-btn" id="prevBtn">&#8592;</button>'+
    '<button class="flip-btn" id="flipBtn">'+(flipped?'unflip':'flip')+'</button>'+
    '<button class="nav-btn" id="nextBtn">&#8594;</button>'+
    '</div>'+
    '<div class="swipe-hint">&#8592; &#8594; arrow keys &middot; space to flip</div>';

  updateCounter();

  if(dir){
    const s=document.getElementById('cardScene');
    s.classList.add(dir===1?'slide-right':'slide-left');
    setTimeout(function(){s.classList.remove('slide-right','slide-left');},300);
  }

  document.getElementById('theCard').addEventListener('click',toggleFlip);
  document.getElementById('flipBtn').addEventListener('click',toggleFlip);
  document.getElementById('prevBtn').addEventListener('click',function(){navigate(-1);});
  document.getElementById('nextBtn').addEventListener('click',function(){navigate(1);});

  const sc=document.getElementById('cardScene');
  sc.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX;},{passive:true});
  sc.addEventListener('touchend',function(e){const dx=touchStartX-e.changedTouches[0].clientX;if(Math.abs(dx)>50)navigate(dx>0?1:-1);});
}

function toggleFlip(){
  flipped=!flipped;
  const c=document.getElementById('theCard');
  if(c)c.classList.toggle('flipped',flipped);
  const b=document.getElementById('flipBtn');
  if(b)b.textContent=flipped?'unflip':'flip';
}

function navigate(dir){idx=((idx+dir)+deck.length)%deck.length;flipped=false;renderCard(dir);}

function renderUnitStrip(){
  const strip=document.getElementById('unitStrip');
  strip.innerHTML=UNITS.map(function(u){return '<button class="unit-tab'+(u.id===activeUnit?' active':'')+'" data-id="'+u.id+'">'+u.label+'</button>';}).join('');
  strip.querySelectorAll('.unit-tab').forEach(function(btn){
    btn.addEventListener('click',function(){
      activeUnit=btn.dataset.id;
      deck=activeUnit==='all'?ALL_CARDS.slice():ALL_CARDS.filter(function(c){return c.u===activeUnit;});
      idx=0;flipped=false;
      strip.querySelectorAll('.unit-tab').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      renderCard(null);
    });
  });
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')navigate(1);
  else if(e.key==='ArrowLeft')navigate(-1);
  else if(e.key===' '||e.key==='Enter'){e.preventDefault();toggleFlip();}
});

renderUnitStrip();
renderCard(null);
</script>
